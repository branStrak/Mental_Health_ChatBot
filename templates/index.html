<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MannTalk - Mental Health Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <span class="logo-icon">
              <i class="fa-solid fa-brain"></i>
            </span>
            <div class="logo-text">MannTalk</div>
          </div>
          <div class="header-buttons" id="auth-buttons">
            <button id="theme-toggle" class="theme-button">
              <i class="fa-solid fa-moon"></i>
              <span class="sr-only">Toggle theme</span>
            </button>
            <a href="/"> <button id="home-btn" class="btn btn-outline">HOME</button></a>

            <button id="sign-in-btn" class="btn btn-outline">Sign In</button>
            <button class="btn btn-primary sign-up-btn">Sign Up</button>
            <button id="sign-out-btn" class="btn btn-outline" style="display: none;">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <div class="app-container">
      <!-- Sidebar for conversation history -->
      <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
          <div class="new-chat-button">
            <button id="new-conversation" class="btn btn-primary btn-block">
              <i class="fa-solid fa-plus"></i>
              New Conversation
            </button>
          </div>
          <div class="conversation-list-container">
            <h2>History</h2>
            <ul id="conversation-list" class="conversation-list"></ul>
gfbv            </div>
        </div>
      </div>
      
      <!-- Mobile sidebar overlay -->
      <div id="sidebar-overlay" class="sidebar-overlay"></div>
      
      <!-- Main chat area -->
      <div class="chat-container">
        <div class="chat-header">
          <button id="toggle-sidebar" class="sidebar-toggle">
            <i class="fa-solid fa-bars"></i>
            <span class="sr-only">Toggle sidebar</span>
          </button>
          <h2 id="chat-title">New conversation</h2>
        </div>
        
        <div id="chat-window" class="chat-window">
          <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-icon">
              <i class="fa-solid fa-brain"></i>
            </div>
            <h3>Welcome to MannTalk</h3>
            <p>
              I'm here to listen, support, and provide guidance for your mental well-being.
              How are you feeling today?
            </p>
          </div>
          <div id="message-container" class="message-container"></div>
        </div>
         
        <form id="chat-form" class="chat-input-container">
          <div class="chat-input-wrapper">
            <div class="input-group">
              <textarea id="chat-input" class="chat-input" placeholder="Ask me about your feelings..." rows="1"></textarea>
              <select id="model-selector" class="model-selector">
                <option value="default">MannTalk (default)</option>
                <option value="gemma">Gemma</option>
              </select>
              <button id="send-button" class="send-button" type="submit">
                <i class="fa fa-paper-plane"></i>
                <span class="sr-only">Send message</span>
              </button>
            </div>
          </div>
          <input type="hidden" id="conversation-id" value="">
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
  </body>
</html>
